#{extends 'main.html' /}
<header>
    <div class="topo">
        <div class="logo">
#{if p?.id}
#{set title:'Editar produto' /}
<h1>Editar produto</h1>
#{/if}
#{else}
#{set title:'Cadastro de produto' /}
<h1>Cadastrar produto</h1>
#{/else}
        </div>
    </div>
    <nav>
        <a class="atual" href="#">Cadastrar novo produto</a>
        <a href="@{Fornecedores.form()}">Cadastrar novo fornecedor</a>
        <a href="@{Fornecedores.listar()}">Lista de fornecedores</a>
        <a href="@{Produtos.listar()}">Lista de produtos</a>
    </nav>
</header>
<div class="corpo">
<form action=@{Produtos.salvar()}>
<input type="hidden" name="p.id" value="${p.id}">
<label>Nome: </label>
<input type="text" name="p.nome" value="${p.nome}" required> <br>
<label>Descrição:</label><br>
<textarea name="p.descricao"  rows="4" cols="50" placeholder="Descreva o produto...">${p.descricao}</textarea> <br>
<label>Preço: </label>
<input type="number" step="0.01" name="p.preco" value="${p.preco}" required> <br>
<label>Quantidade: </label>
<input type="number" step="1" name="p.quantidade" value="${p.quantidade}" required> <br>
<label>Categoria: </label>
<select name="p.categoria" required>
<option value="Moda" ${p.categoria == 'Moda' ? 'selected' : ''}>Moda</option>
<option value="Tecnologia" ${p.categoria == 'Tecnologia' ? 'selected' : ''}>Tecnologia</option>
<option value="Casa" ${p.categoria == 'Casa' ? 'selected' : ''}>Casa</option>
<option value="Outros" ${p.categoria == 'Outros' ? 'selected' : ''}>Outros</option>
</select>
<br>
<label>Fornecedor: </label>
<select name="p.fornecedor.id">
	#{list items:listaF, as:'f'}
			<option value="${f.id}" ${f.id == p.fornecedor?.id ? 'selected' : ''}>${f.nome}</option>
	#{/list}
</select> <br>
<input type="submit" value="Salvar">
</form>
</div>
